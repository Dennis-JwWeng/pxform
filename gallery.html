<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery — Pxform</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0a0a0f;
            --bg-card: #13131a;
            --text: #e4e4e7;
            --text-dim: #a1a1aa;
            --border: #27272a;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            padding: 20px 40px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .back-link {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border: 1px solid var(--border);
            border-radius: 8px;
            transition: all .2s;
        }
        .back-link:hover { color: var(--text); border-color: var(--primary); }
        .page-title {
            font-size: 16px;
            font-weight: 600;
            letter-spacing: .02em;
        }
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 24px;
        }
        h1 {
            font-size: clamp(28px, 4vw, 44px);
            font-weight: 700;
            margin-bottom: 12px;
            background: linear-gradient(135deg, #fff 0%, #a1a1aa 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .subtitle {
            color: var(--text-dim);
            font-size: 15px;
            margin-bottom: 32px;
            text-align: center;
            max-width: 720px;
        }
        .video-wrap {
            width: 100%;
            max-width: 1200px;
            background: #000;
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.5);
        }
        video { width: 100%; height: auto; display: block; }
        footer {
            padding: 20px;
            text-align: center;
            color: var(--text-dim);
            font-size: 13px;
            border-top: 1px solid var(--border);
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="back-link">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
            Back
        </a>
        <span class="page-title">Pxform Gallery</span>
        <span style="width:60px;"></span>
    </header>
    <main>
        <h1>Gallery</h1>
        <p class="subtitle">Showcase video for the Pxform dataset and PartFlow editing results.</p>
        <div class="video-wrap">
            <video controls autoplay preload="metadata" playsinline>
                <source src="https://github.com/Dennis-JwWeng/pxform/releases/download/video-v1/gallery.mp4" type="video/mp4">
                Your browser does not support the video tag.
            </video>
        </div>
    </main>
    <footer>Pxform &middot; <a href="index.html" style="color:var(--text-dim);">Return to main page</a></footer>
</body>
</html>
